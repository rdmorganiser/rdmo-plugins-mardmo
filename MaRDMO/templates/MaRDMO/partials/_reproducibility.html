<h3 id="{{ anchor }}">{{ title }}</h3>
{% if value.0.0 == option.YesLargeText %}
    <p>Yes: {{ value.0.1 }}</p>
{% elif value.0.0 == option.No %}
    <p>No</p>
{% elif value.0.0 == option.NotRelevant %}
    <p>Not relevant</p>
{% else %}
    <p><strong style="color:red;">MISSING {{ title|upper }}</strong></p>
{% endif %}
